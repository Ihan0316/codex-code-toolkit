# matcher = "^Bash$"
# [[hooks.PreToolUse.hooks]]
# type = "command"
# command = '/usr/bin/python3 "$(git rev-parse --show-toplevel)/.codex/hooks/guard-bash.py"'
# timeout = 10
# statusMessage = "Bash 명령 검사 중"
